# إعداد Nginx: يقدّم واجهة React الثابتة ويمرر /api و /admin إلى Django
# التثبيت:
#   sudo cp deploy/nginx-pm.conf /etc/nginx/sites-available/pm
#   sudo ln -s /etc/nginx/sites-available/pm /etc/nginx/sites-enabled/pm
#   sudo nginx -t && sudo systemctl reload nginx
# ثم HTTPS:
#   sudo certbot --nginx -d pm.example.com

server {
    listen 80;
    server_name pm.example.com;   # ← عدّل النطاق

    # تطبيق React المبني (client/dist)
    root /srv/pm/client/dist;
    index index.html;

    # حد أقصى لحجم المرفقات المرفوعة
    client_max_body_size 25M;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # مسارات SPA — أي مسار غير معروف يعود إلى index.html
    location / {
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # المرفقات وصور الموظفين وصور المحرر — يقدمها Nginx مباشرة
    location /media/ {
        alias /srv/pm/server/media/;
    }

    # ملفات لوحة إدارة Django (نتاج collectstatic)
    location /static/ {
        alias /srv/pm/server/staticfiles/;
    }
}
